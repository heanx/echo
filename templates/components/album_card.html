<article class="rounded-lg bg-zinc-100 p-3 transition hover:bg-zinc-200/70 dark:bg-zinc-950 dark:hover:bg-zinc-900">
  <div class="{% if not album.cover_url %}cover-{{ album.cover_theme|default:'summer' }}{% endif %} aspect-square rounded-lg bg-cover bg-center"
       {% if album.cover_url %}style="background-image: url('{{ album.cover_url }}');"{% endif %}></div>
  <h3 class="mt-3 truncate font-bold">{{ album.title }}</h3>
  <p class="mt-1 truncate text-sm text-zinc-500">{{ album.creator|default:"Echo 用户" }}</p>
  <p class="mt-2 line-clamp-2 text-sm text-zinc-500">{{ album.description|default:"来自 Echo 社区的热门声音合集。" }}</p>
</article>
