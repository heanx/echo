<article class="grid w-full grid-cols-[48px_minmax(0,1fr)_64px_40px] items-center gap-4 px-4 py-3 transition hover:bg-zinc-200/70 dark:hover:bg-zinc-900 md:grid-cols-[48px_minmax(140px,1fr)_minmax(110px,260px)_70px_90px_40px]" data-track-row>
  <button
    type="button"
    class="{% if not track.cover_url %}cover-{{ track.cover_theme|default:'summer' }}{% endif %} grid h-12 w-12 place-items-center rounded-lg bg-cover bg-center text-white"
    {% if track.cover_url %}style="background-image: url('{{ track.cover_url }}');"{% endif %}
    data-echo-track
    data-src="{{ track.audio_url|default:'' }}"
    data-id="{{ track.id }}"
    data-title="{{ track.title|escape }}"
    data-artist="{{ track.artist|default:'Echo 用户'|escape }}"
    data-cover="{{ track.cover_theme|default:'summer' }}"
    data-cover-url="{{ track.cover_url }}"
    aria-label="播放 {{ track.title }}">
    <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor"><path d="M8 5v14l11-7L8 5Z"/></svg>
  </button>

  <div class="min-w-0">
    <a href="{% url 'tracks:detail' track.id %}" class="block truncate font-bold transition hover:text-brand" data-main-nav>{{ track.title }}</a>
    <p class="truncate text-sm text-zinc-500">by {{ track.artist|default:"Echo 用户" }} · {{ track.created_at|date:"m-d H:i" }}</p>
  </div>

  <span class="waveform hidden h-8 opacity-70 md:block"></span>
  <span class="text-sm text-zinc-500"><span data-track-plays="{{ track.id }}">{{ track.plays|default:0 }}</span> 播放</span>
  <span class="hidden md:block">{% include "components/track_like_button.html" with track=track liked_track_ids=liked_track_ids %}</span>
  <a href="{% url 'tracks:detail' track.id %}" class="text-zinc-500 transition hover:text-zinc-900 dark:hover:text-white" aria-label="查看详情" data-main-nav>
    <span aria-hidden="true">...</span>
  </a>
</article>
