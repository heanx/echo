<div class="avatar-cropper {% if compact %}h-12 px-4 py-0 opacity-50 pointer-events-none{% else %}mt-3 hidden p-3{% endif %} rounded-lg border border-zinc-200 bg-white transition dark:border-zinc-800 dark:bg-[#121212]"
     data-avatar-cropper
     data-input-id="{{ input_id }}"
     {% if output_name %}data-output-name="{{ output_name }}"{% endif %}
     {% if allowed_extensions %}data-allowed-extensions="{{ allowed_extensions }}"{% endif %}
     {% if external_frame_id %}data-external-frame-id="{{ external_frame_id }}"{% endif %}
     {% if initial_avatar_url %}data-initial-avatar-url="{{ initial_avatar_url }}"{% endif %}>
  {% if not compact %}
  <div>
    <div>
      <p class="text-sm font-bold">{{ title|default:"头像预览" }}</p>
      <p class="mt-1 text-xs text-zinc-500">{{ description|default:"拖动图片调整位置，使用滑杆缩放，提交时会保存裁剪后的头像。" }}</p>
    </div>
  </div>
  {% endif %}
  <div class="{% if compact %}flex h-full items-center{% else %}mt-3 flex flex-col gap-4 sm:flex-row sm:items-center{% endif %}">
    {% if not external_frame_id %}
    <div class="avatar-crop-frame relative h-40 w-40 shrink-0 overflow-hidden {% if shape == 'square' %}rounded-lg{% else %}rounded-full{% endif %} bg-zinc-100 ring-1 ring-zinc-200 dark:bg-zinc-900 dark:ring-zinc-800"
         data-avatar-frame>
      <img alt="" class="avatar-crop-image select-none" data-avatar-image draggable="false">
    </div>
    {% endif %}
    <div class="min-w-0 flex-1 {% if not compact %}space-y-3{% endif %}">
      <label class="{% if compact %}flex h-10 items-center gap-3{% else %}block{% endif %}">
        <span class="{% if compact %}w-12 shrink-0 text-xs font-bold text-zinc-500{% else %}mb-2 block text-xs font-bold text-zinc-500{% endif %}">缩放</span>
        <input type="range" min="1" max="3" step="0.01" value="1.2" class="w-full accent-brand" data-avatar-zoom>
      </label>
      <div class="{% if compact %}hidden{% else %}flex{% endif %} min-w-0 items-center gap-2 text-xs text-zinc-500">
        <p class="min-w-0 flex-1 truncate" data-avatar-filename></p>
        {% if initial_avatar_url %}
          <button type="button"
                  class="rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-semibold text-zinc-600 transition hover:border-brand hover:text-brand dark:border-zinc-700 dark:text-zinc-300"
                  data-avatar-crop-current>
            裁剪
          </button>
          <button type="button"
                  class="rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-semibold text-zinc-600 transition hover:border-brand hover:text-brand dark:border-zinc-700 dark:text-zinc-300"
                  data-avatar-keep-current>
            保留
          </button>
          <a href="{{ initial_avatar_url }}"
             download
             class="rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-semibold text-zinc-600 transition hover:border-brand hover:text-brand dark:border-zinc-700 dark:text-zinc-300"
             data-avatar-download-current>
            下载
          </a>
        {% endif %}
        <button type="button"
                class="{% if compact %}hidden{% else %}field-icon-button field-icon-button-danger shrink-0{% endif %}"
                aria-label="取消头像"
                data-avatar-clear>
          <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <p class="hidden text-xs text-rose-500" data-avatar-error></p>
    </div>
  </div>
</div>
