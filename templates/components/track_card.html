<article class="group overflow-hidden rounded-lg bg-zinc-100 transition hover:bg-zinc-200/70 dark:bg-zinc-950 dark:hover:bg-zinc-900">
  <div class="{% if not track.cover_url %}cover-{{ track.cover_theme|default:'summer' }}{% endif %} relative aspect-[4/3] bg-cover bg-center"
       {% if track.cover_url %}style="background-image: url('{{ track.cover_url }}');"{% endif %}>
    <a href="{% url 'tracks:detail' track.id %}" class="absolute inset-0" aria-label="查看 {{ track.title }}"></a>
    <button
      type="button"
      class="absolute bottom-4 right-4 grid h-11 w-11 place-items-center rounded-full bg-white/90 text-zinc-950 opacity-95 shadow-lg transition group-hover:scale-105"
      data-echo-track
      data-src="{{ track.audio_url|default:'' }}"
      data-id="{{ track.id }}"
      data-title="{{ track.title|escape }}"
      data-artist="{{ track.artist|default:'Echo 用户'|escape }}"
      data-cover="{{ track.cover_theme|default:'summer' }}"
      data-cover-url="{{ track.cover_url }}"
      aria-label="播放 {{ track.title }}">
      <svg viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor"><path d="M8 5v14l11-7L8 5Z"/></svg>
    </button>
  </div>
  <div class="p-4">
    <h3 class="truncate font-bold">{{ track.title }}</h3>
    <p class="mt-1 truncate text-sm text-zinc-500 dark:text-zinc-400">{{ track.artist|default:"Echo 用户" }}</p>
    <p class="mt-3 text-xs text-zinc-500">{{ track.plays|default:0 }} 次播放 · {{ track.likes|default:0 }} 次喜欢</p>
  </div>
</article>
