<div class="rounded-xl border border-dashed border-zinc-300 bg-zinc-50 px-5 py-6 text-center dark:border-zinc-800 dark:bg-zinc-950/80">
  <div class="mx-auto grid h-12 w-12 place-items-center rounded-full bg-zinc-200 text-zinc-600 dark:bg-zinc-900 dark:text-zinc-300">
    {% if icon == "lyrics" %}
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h10M4 14h16M4 18h12"/></svg>
    {% elif icon == "comments" %}
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"/></svg>
    {% elif icon == "upload" %}
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M5 21h14"/></svg>
    {% elif icon == "warning" %}
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
    {% else %}
      <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    {% endif %}
  </div>
  <h2 class="mt-4 text-lg font-black">{{ title }}</h2>
  <p class="mt-2 text-sm leading-6 text-zinc-500 dark:text-zinc-400">{{ description }}</p>
  {% if action_href and action_label %}
    <a href="{{ action_href }}"
       class="mt-4 inline-flex items-center justify-center rounded-lg bg-brand px-4 py-2 text-sm font-bold text-white transition hover:bg-indigo-500"
       {% if action_hx_get %}
         hx-get="{{ action_hx_get }}"
         hx-select="#main-content"
         hx-target="#main-content"
         hx-swap="outerHTML"
         hx-push-url="true"
       {% endif %}>
      {{ action_label }}
    </a>
  {% endif %}
</div>
