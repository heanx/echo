<article class="rounded-lg border border-zinc-200 bg-white p-4 transition hover:border-brand/40 dark:border-zinc-800 dark:bg-zinc-950">
  <div class="flex gap-3">
    <span class="{% if comment.tone == 'brand' %}bg-brand{% else %}cover-{{ track.cover_theme|default:'summer' }}{% endif %} grid h-10 w-10 shrink-0 place-items-center rounded-full text-sm font-black text-white">
      {{ comment.author|first }}
    </span>
    <div class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center gap-2">
        <h2 class="font-bold">{{ comment.author }}</h2>
        {% if comment.badge %}
          <span class="rounded-full bg-brand/10 px-2 py-0.5 text-xs font-bold text-brand">{{ comment.badge }}</span>
        {% endif %}
        {% if comment.question %}
          <span class="rounded-full bg-zinc-100 px-2 py-0.5 text-xs font-bold text-zinc-600 dark:bg-zinc-900 dark:text-zinc-300">问题</span>
        {% endif %}
        <span class="text-xs text-zinc-500">{{ comment.time }}</span>
      </div>
      <p class="mt-2 leading-7 text-zinc-700 dark:text-zinc-200">{{ comment.body }}</p>
      <div class="mt-3 flex items-center gap-4 text-sm text-zinc-500">
        <button type="button" class="font-semibold transition hover:text-brand">{{ comment.likes }} 喜欢</button>
        <button type="button" class="font-semibold transition hover:text-brand">{{ comment.replies }} 回复</button>
        <button type="button" class="font-semibold transition hover:text-brand">分享</button>
      </div>
    </div>
  </div>
</article>
