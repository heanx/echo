{% extends "base.html" %}

{% block title %}上传歌词 - Echo{% endblock %}

{% block main %}
<section class="mx-auto max-w-5xl pb-10">
  <h1 class="text-3xl font-black">上传歌词</h1>
  <p class="mt-2 text-sm text-zinc-500">支持粘贴 LRC 或纯文本，也可以把作品标记为纯音乐或暂无歌词。</p>

  <form method="post" enctype="multipart/form-data" class="mt-6 space-y-5 rounded-lg border border-zinc-200 bg-zinc-50 p-5 dark:border-zinc-800 dark:bg-zinc-950">
    {% csrf_token %}
    <div>
      <label class="mb-2 block text-sm font-semibold" for="track">音频作品</label>
      <select id="track" name="track" class="w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950" required>
        {% for track in tracks %}
          <option value="{{ track.id }}"
                  data-audio-url="{{ track.audio_url }}"
                  {% if selected_track and selected_track.id == track.id %}selected{% endif %}>
            {{ track.title }} - {{ track.artist|default:"Echo 用户" }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="mb-2 block text-sm font-semibold" for="status">歌词状态</label>
      <select id="status" name="status" class="w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950">
        {% for value, label in lyric_statuses %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="lyrics-inputs grid gap-5 sm:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-semibold" for="language">语言</label>
        <input id="language" name="language" value="zh-Hans" class="w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950">
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold" for="kind">类型</label>
        <select id="kind" name="kind" class="w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950">
          {% for value, label in lyrics_kinds %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="lyrics-inputs">
      <label class="mb-2 block text-sm font-semibold" for="source_file">歌词文件</label>
      <input id="source_file" name="source_file" type="file" accept=".lrc,.txt" class="w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 text-sm dark:border-zinc-700 dark:bg-zinc-950">
      <p id="lyrics-file-hint" class="mt-2 text-xs text-zinc-500">选择 .lrc 或 .txt 后会自动载入下方编辑器。</p>
    </div>
    <div class="lyrics-inputs">
      <div class="flex flex-wrap items-end justify-between gap-3">
        <div>
          <label class="block text-sm font-semibold" for="raw_text">歌词编辑器</label>
          <p class="mt-1 text-xs text-zinc-500">时间和歌词分列编辑；保存时会自动合成为 LRC/纯文本。</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="lyrics-add-row" type="button" class="rounded-lg border border-zinc-300 px-3 py-2 text-xs font-bold text-zinc-600 transition hover:border-brand hover:text-brand dark:border-zinc-700 dark:text-zinc-300">新增行</button>
          <button id="lyrics-fill-current-time" type="button" class="rounded-lg border border-zinc-300 px-3 py-2 text-xs font-bold text-zinc-600 transition hover:border-brand hover:text-brand dark:border-zinc-700 dark:text-zinc-300">填入当前时间</button>
        </div>
      </div>

      <div class="mt-4 rounded-lg border border-zinc-200 bg-white dark:border-zinc-800 dark:bg-[#121212]">
        <div class="grid grid-cols-[112px_minmax(0,1fr)_40px] gap-2 border-b border-zinc-200 px-3 py-2 text-xs font-bold text-zinc-500 dark:border-zinc-800">
          <span>时间</span>
          <span>歌词</span>
          <span></span>
        </div>
        <div id="lyrics-editor-rows" class="max-h-[420px] overflow-y-auto p-3 echo-scrollbar"></div>
      </div>

      <div class="mt-4 rounded-lg border border-zinc-200 bg-white p-3 dark:border-zinc-800 dark:bg-[#121212]">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <p class="text-sm font-semibold">预听核对</p>
            <p id="lyrics-preview-hint" class="mt-1 text-xs text-zinc-500">选择作品后可预听，并把当前播放时间填入选中的歌词行。</p>
          </div>
          <span id="lyrics-preview-time" class="text-xs font-bold text-zinc-500">00:00</span>
        </div>
        <audio id="lyrics-preview-audio" class="mt-3 w-full" controls preload="metadata"></audio>
      </div>

      <details class="mt-4">
        <summary class="cursor-pointer text-sm font-semibold text-zinc-500 transition hover:text-brand">查看原始歌词文本</summary>
        <textarea id="raw_text" name="raw_text" rows="10" class="mt-3 w-full rounded-lg border border-zinc-300 bg-white px-4 py-3 font-mono text-sm outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950" placeholder="[00:12.00] 我在回声里听见一束光"></textarea>
      </details>
    </div>
    <div class="flex items-center gap-3">
      <button type="submit" class="rounded-lg bg-brand px-5 py-3 font-bold text-white hover:bg-indigo-500">保存歌词</button>
      <a href="{% url 'lyrics' %}" class="rounded-lg px-5 py-3 font-bold text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-900">取消</a>
    </div>
  </form>
</section>
<script>
  (function () {
    const status = document.getElementById("status");
    const trackSelect = document.getElementById("track");
    const lyricsInputs = document.querySelectorAll(".lyrics-inputs");
    const sourceFile = document.getElementById("source_file");
    const lyricsFileHint = document.getElementById("lyrics-file-hint");
    const rawText = document.getElementById("raw_text");
    const editorRows = document.getElementById("lyrics-editor-rows");
    const addRow = document.getElementById("lyrics-add-row");
    const fillCurrentTime = document.getElementById("lyrics-fill-current-time");
    const previewAudio = document.getElementById("lyrics-preview-audio");
    const previewHint = document.getElementById("lyrics-preview-hint");
    const previewTime = document.getElementById("lyrics-preview-time");
    const lrcLinePattern = /^\[(\d{1,2}:\d{2}(?:\.\d{1,3})?)\]\s*(.*)$/;
    let selectedRow = null;

    function formatSeconds(value) {
      if (!Number.isFinite(value)) return "00:00";
      const minutes = Math.floor(value / 60).toString().padStart(2, "0");
      const seconds = Math.floor(value % 60).toString().padStart(2, "0");
      const hundredths = Math.floor((value % 1) * 100).toString().padStart(2, "0");
      return minutes + ":" + seconds + "." + hundredths;
    }
    function normalizeTime(value) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return "";
      const match = trimmed.match(/^(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?$/);
      if (!match) return trimmed;
      return match[1].padStart(2, "0") + ":" + match[2].padStart(2, "0") + (match[3] ? "." + match[3].padEnd(2, "0").slice(0, 2) : "");
    }
    function parseLyricsText(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map(function (line) {
          const trimmed = line.trim();
          if (!trimmed) return null;
          const match = trimmed.match(lrcLinePattern);
          return match ? { time: match[1], text: match[2] || "" } : { time: "", text: trimmed };
        })
        .filter(Boolean);
    }
    function serializeRows() {
      if (!editorRows) return "";
      return Array.from(editorRows.querySelectorAll("[data-lyrics-row]"))
        .map(function (row) {
          const time = normalizeTime(row.querySelector("[data-lyrics-time]").value);
          const text = row.querySelector("[data-lyrics-text]").value.trim();
          if (!time && !text) return "";
          return time ? "[" + time + "] " + text : text;
        })
        .filter(Boolean)
        .join("\n");
    }
    function syncRawText() {
      if (rawText) rawText.value = serializeRows();
    }
    function createRow(time, text) {
      const row = document.createElement("div");
      row.dataset.lyricsRow = "true";
      row.className = "grid grid-cols-[112px_minmax(0,1fr)_40px] gap-2 py-1";

      const timeInput = document.createElement("input");
      timeInput.type = "text";
      timeInput.dataset.lyricsTime = "true";
      timeInput.placeholder = "00:12.00";
      timeInput.value = time || "";
      timeInput.className = "rounded-lg border border-zinc-300 bg-white px-3 py-2 font-mono text-sm outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950";

      const textInput = document.createElement("input");
      textInput.type = "text";
      textInput.dataset.lyricsText = "true";
      textInput.placeholder = "输入歌词";
      textInput.value = text || "";
      textInput.className = "rounded-lg border border-zinc-300 bg-white px-3 py-2 text-sm outline-none focus:border-brand dark:border-zinc-700 dark:bg-zinc-950";

      const remove = document.createElement("button");
      remove.type = "button";
      remove.className = "rounded-lg text-zinc-400 transition hover:bg-rose-500/10 hover:text-rose-500";
      remove.setAttribute("aria-label", "删除歌词行");
      remove.textContent = "×";

      row.append(timeInput, textInput, remove);
      row.addEventListener("focusin", function () {
        selectedRow = row;
        editorRows.querySelectorAll("[data-lyrics-row]").forEach(function (item) {
          item.classList.toggle("rounded-lg", item === row);
          item.classList.toggle("bg-brand/10", item === row);
        });
      });
      row.addEventListener("input", syncRawText);
      remove.addEventListener("click", function () {
        row.remove();
        if (selectedRow === row) selectedRow = null;
        syncRawText();
      });
      return row;
    }
    function renderEditor(rows) {
      if (!editorRows) return;
      editorRows.innerHTML = "";
      (rows.length ? rows : [{ time: "", text: "" }]).forEach(function (row) {
        editorRows.appendChild(createRow(row.time, row.text));
      });
      selectedRow = editorRows.querySelector("[data-lyrics-row]");
      syncRawText();
    }
    function syncPreviewAudio() {
      if (!trackSelect || !previewAudio) return;
      const option = trackSelect.options[trackSelect.selectedIndex];
      const url = option ? option.dataset.audioUrl : "";
      previewAudio.src = url || "";
      if (previewHint) previewHint.textContent = url ? "正在预听：" + option.textContent.trim() : "当前作品没有可预听音频。";
      if (previewTime) previewTime.textContent = "00:00";
    }

    if (!status) return;
    function syncLyricsInputs() {
      const disabled = status.value !== "available";
      lyricsInputs.forEach(function (group) {
        group.classList.toggle("opacity-50", disabled);
        group.querySelectorAll("input, select, textarea").forEach(function (field) {
          field.disabled = disabled;
        });
      });
    }
    status.addEventListener("change", syncLyricsInputs);
    syncLyricsInputs();
    if (trackSelect) {
      trackSelect.addEventListener("change", syncPreviewAudio);
      syncPreviewAudio();
    }
    if (sourceFile) {
      sourceFile.addEventListener("change", function () {
        const file = sourceFile.files && sourceFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.addEventListener("load", function () {
          const text = String(reader.result || "");
          if (rawText) rawText.value = text;
          renderEditor(parseLyricsText(text));
          if (lyricsFileHint) lyricsFileHint.textContent = file.name + " 已载入，可在下方继续校对。";
        });
        reader.addEventListener("error", function () {
          if (lyricsFileHint) lyricsFileHint.textContent = "歌词文件读取失败，请尝试复制文本到下方。";
        });
        reader.readAsText(file, "utf-8");
      });
    }
    if (addRow) {
      addRow.addEventListener("click", function () {
        const row = createRow("", "");
        editorRows.appendChild(row);
        selectedRow = row;
        row.querySelector("[data-lyrics-text]").focus();
        syncRawText();
      });
    }
    if (fillCurrentTime) {
      fillCurrentTime.addEventListener("click", function () {
        const row = selectedRow || (editorRows && editorRows.querySelector("[data-lyrics-row]"));
        if (!row) return;
        row.querySelector("[data-lyrics-time]").value = formatSeconds(previewAudio ? previewAudio.currentTime : 0);
        syncRawText();
      });
    }
    if (previewAudio && previewTime) {
      previewAudio.addEventListener("timeupdate", function () {
        previewTime.textContent = formatSeconds(previewAudio.currentTime);
      });
    }
    if (rawText) {
      rawText.addEventListener("input", function () {
        renderEditor(parseLyricsText(rawText.value));
      });
      renderEditor(parseLyricsText(rawText.value));
    }
  })();
</script>
{% endblock %}
